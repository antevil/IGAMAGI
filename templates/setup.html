<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ document.title or document.filename }} - IGAMAGI Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <header class="border-b border-zinc-800 bg-zinc-950/90 backdrop-blur sticky top-0 z-30">
    <div class="max-w-[1800px] mx-auto px-4 py-4 flex items-center justify-between gap-4">
      <div>
        <a href="{{ url_for('main.index') }}" class="text-sm text-indigo-400 hover:text-indigo-300">← 戻る</a>
        <h1 class="text-xl font-semibold mt-1">{{ document.title or document.filename }}</h1>
        <p class="text-sm text-zinc-400">Setup / doc_id={{ document.id }}</p>
      </div>
      <div class="flex gap-2 items-center flex-wrap">
        <select id="pageSelect" class="rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm">
          {% for page in pages %}
            <option value="{{ page.page_no }}">Page {{ page.page_no + 1 }}</option>
          {% endfor %}
        </select>
        <button id="reloadBtn" class="rounded-lg bg-zinc-800 px-3 py-2 text-sm hover:bg-zinc-700">再読込</button>
        <a href="{{ url_for('main.reader', doc_id=document.id) }}"
           class="rounded-lg bg-indigo-600 px-3 py-2 text-sm hover:bg-indigo-500">
          Readerへ
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-[1800px] mx-auto px-4 py-4 grid grid-cols-12 gap-4">
    <section class="col-span-12 xl:col-span-4 space-y-4">
      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4 space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold">文書メタ</h2>
          <span class="text-xs text-zinc-400">title / abstract / body を準備</span>
        </div>
        <div class="space-y-2">
          <label class="block text-sm text-zinc-300">タイトル</label>
          <input id="titleInput" value="{{ document.title or '' }}" class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm">
          <button id="saveTitleBtn" class="rounded-lg bg-indigo-600 px-3 py-2 text-sm hover:bg-indigo-500">タイトル保存</button>
        </div>
      </div>

      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4 space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold">段落作成</h2>
          <span id="selectionStatus" class="text-xs text-zinc-400">開始行と終了行を選択</span>
        </div>

        <div class="grid grid-cols-2 gap-3 text-sm">
          <div>
            <label class="block text-zinc-300 mb-1">start_line_id</label>
            <input id="startLineId" readonly class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2">
          </div>
          <div>
            <label class="block text-zinc-300 mb-1">end_line_id</label>
            <input id="endLineId" readonly class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2">
          </div>
          <div>
            <label class="block text-zinc-300 mb-1">order_index</label>
            <input id="orderIndex" type="number" value="{{ paragraphs|length }}" class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2">
          </div>
          <div>
            <label class="block text-zinc-300 mb-1">unit_type</label>
            <select id="unitType" class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2">
              <option value="title">title</option>
              <option value="abstract">abstract</option>
              <option value="body" selected>body</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm text-zinc-300 mb-1">paragraph title</label>
          <input id="headingText" class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm" placeholder="任意">
        </div>

        <div class="flex gap-2 flex-wrap">
          <button id="saveParagraphBtn" class="rounded-lg bg-emerald-600 px-3 py-2 text-sm hover:bg-emerald-500">段落保存</button>
          <button id="clearSelectionBtn" class="rounded-lg bg-zinc-800 px-3 py-2 text-sm hover:bg-zinc-700">選択クリア</button>
        </div>
      </div>

      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4 space-y-3">
        <h2 class="font-semibold">Figure登録</h2>
        <p class="text-sm text-zinc-400">Shift+ドラッグで図、Alt+ドラッグでcaption範囲を指定します。</p>

        <div class="grid grid-cols-2 gap-3 text-sm">
          <div>
            <label class="block text-zinc-300 mb-1">fig_no</label>
            <input id="figNoInput" class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2" placeholder="Figure 1">
          </div>
          <div>
            <label class="block text-zinc-300 mb-1">page</label>
            <input id="figurePageNo" readonly class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2">
          </div>
        </div>

        <div>
          <label class="block text-zinc-300 mb-1 text-sm">caption text</label>
          <textarea id="captionTextInput" rows="3" class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm"></textarea>
        </div>

        <div class="text-xs text-zinc-400 space-y-1">
          <div id="imageBboxText">image_bbox: 未選択</div>
          <div id="captionBboxText">caption_bbox: 未選択</div>
        </div>

        <div class="flex gap-2">
          <button id="saveFigureBtn" class="rounded-lg bg-fuchsia-600 px-3 py-2 text-sm hover:bg-fuchsia-500">Figure保存</button>
          <button id="clearFigureSelectionBtn" class="rounded-lg bg-zinc-800 px-3 py-2 text-sm hover:bg-zinc-700">bboxクリア</button>
        </div>
      </div>

      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold">現在の登録状況</h2>
          <button id="loadParagraphsBtn" class="rounded-lg bg-zinc-800 px-3 py-2 text-sm hover:bg-zinc-700">更新</button>
        </div>
        <div id="paragraphList" class="space-y-3 max-h-[40vh] overflow-auto"></div>
      </div>
    </section>

    <section class="col-span-12 xl:col-span-8 space-y-4">
      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4 space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold">PDFビュー</h2>
          <span class="text-xs text-zinc-400">行クリックで段落範囲指定 / Shift・Altドラッグでbbox指定</span>
        </div>

        <div id="pdfPane" class="space-y-3">
          <div class="pdf-wrap rounded-xl overflow-hidden border border-zinc-800 bg-black">
            <img id="pageImage" class="w-full block" alt="page preview">
            <div id="lineOverlay" class="pdf-overlay"></div>
            <div id="figureOverlay" class="pdf-overlay"></div>
          </div>
        </div>
      </div>

      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold">登録済み Figure 一覧</h2>
          <button id="loadFiguresBtn" class="rounded-lg bg-zinc-800 px-3 py-2 text-sm hover:bg-zinc-700">更新</button>
        </div>
        <div id="figureList" class="space-y-4 max-h-[40vh] overflow-auto"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="fixed right-4 bottom-4 hidden rounded-xl bg-zinc-900 border border-zinc-700 px-4 py-3 text-sm shadow-2xl"></div>

  <script>
    window.READER_BOOTSTRAP = {
      docId: {{ document.id }},
      initialPageNo: {{ pages[0].page_no if pages else 0 }},
      mode: "setup"
    };
  </script>
  <script src="{{ url_for('static', filename='js/reader.js') }}"></script>
</body>
</html>
