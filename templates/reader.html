<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ document.title or document.filename }} - IGAMAGI Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <header class="border-b border-zinc-800 bg-zinc-950/90 backdrop-blur sticky top-0 z-30">
    <div class="max-w-[1800px] mx-auto px-4 py-4 flex items-center justify-between gap-4">
      <div>
        <a href="{{ url_for('main.index') }}" class="text-sm text-indigo-400 hover:text-indigo-300">← 戻る</a>
        <h1 class="text-xl font-semibold mt-1">{{ document.title or document.filename }}</h1>
        <p class="text-sm text-zinc-400">Reader / doc_id={{ document.id }}</p>
      </div>
    </div>
  </header>

  <main class="max-w-[1800px] mx-auto px-4 py-4 grid grid-cols-12 gap-4">
    <section class="col-span-12 xl:col-span-7 space-y-4">
      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4">
        <div class="flex items-center justify-between mb-3">
          <div>
            <h2 class="font-semibold">段落と対訳</h2>
            <p class="text-sm text-zinc-400">paragraph ごとに文を読み込み、英語と日本語を交互に表示</p>
          </div>
        </div>
        <div id="paragraphList" class="space-y-3 max-h-[82vh] overflow-auto"></div>
      </div>
    </section>

    <section class="col-span-12 xl:col-span-5 space-y-4">
      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4">
        <div class="flex items-center justify-between mb-3">
          <div>
            <h2 class="font-semibold">図表と注釈</h2>
            <p class="text-sm text-zinc-400">今の段階では手動スクロールで閲覧</p>
          </div>
        </div>
        <div id="figureList" class="space-y-4 max-h-[82vh] overflow-auto"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="fixed right-4 bottom-4 hidden rounded-xl bg-zinc-900 border border-zinc-700 px-4 py-3 text-sm shadow-2xl"></div>

  <script>
    window.READER_BOOTSTRAP = {
      docId: {{ document.id }},
      mode: "reader"
    };
  </script>
  <script src="{{ url_for('static', filename='js/reader_view.js') }}"></script>
</body>
</html>
